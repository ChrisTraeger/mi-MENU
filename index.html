<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú — Comida Express</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; text-align: center; }
    .brand { padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .brand-icon { font-size: 50px; cursor: pointer; user-select: none; }
    .brand-name { font-size: 28px; font-weight: bold; margin: 10px 0; }
    #admin-panel { display: none; background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #D85A30; margin-top: 20px; text-align: left; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .btn-save { background: #D85A30; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    .footer { font-size: 12px; color: #888; margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="brand">
    <div class="brand-icon" onclick="handleLogin()">🍔</div>
    <div class="brand-name" id="display-name">Comida Express</div>
    <p>Menú Digital</p>
  </div>

  <div id="admin-panel">
    <h3>⚙️ Panel de Edición</h3>
    <label>Cambiar nombre del negocio:</label>
    <input type="text" id="input-name" placeholder="Ej: Comida Express 2.0">
    <button class="btn-save" onclick="applyChanges()">GUARDAR EN LA NUBE</button>
    <p id="msg" style="color: green; margin-top:10px; display:none; font-weight:bold;">✅ ¡Guardado con éxito!</p>
  </div>

  <div class="footer">Toca la hamburguesa 5 veces para editar</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // TUS DATOS REALES
  const firebaseConfig = {
    apiKey: "AIzaSyByKcM9Z2_PwW0Y9xdbFIfBI6AMviiI4uQ",
    authDomain: "mi-menu-2f5bd.firebaseapp.com",
    databaseURL: "https://mi-menu-2f5bd-default-rtdb.firebaseio.com",
    projectId: "mi-menu-2f5bd",
    appId: "1:524735114538:web:f7095bb24eedcfe2ff4253"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Leer datos de la nube
  db.ref('nombreNegocio').on('value', (snap) => {
    const val = snap.val();
    if(val) {
      document.getElementById('display-name').innerText = val;
      document.getElementById('input-name').value = val;
    }
  });

  let clicks = 0;
  function handleLogin() {
    clicks++;
    if(clicks === 5) {
      if(prompt("Contraseña de administrador:") === "1234") {
        document.getElementById('admin-panel').style.display = 'block';
      }
      clicks = 0;
    }
    setTimeout(() => { clicks = 0; }, 3000);
  }

  function applyChanges() {
    const nuevoNombre = document.getElementById('input-name').value;
    db.ref('nombreNegocio').set(nuevoNombre)
      .then(() => {
        const msg = document.getElementById('msg');
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 3000);
      })
      .catch(err => alert("Error de permisos: " + err.message));
  }
</script>
</body>
</html>
