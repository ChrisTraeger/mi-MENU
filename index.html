<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Digital — Comida Express</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #D85A30; --bg: #f8f9fa; --text: #2d3436; --white: #ffffff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      overflow-y: auto; 
      min-height: 100vh;
    }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 60px; }

    /* VISTA CLIENTE */
    .brand { 
      text-align: center; 
      padding: 40px 20px; 
      background: var(--white); 
      border-radius: 0 0 30px 30px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
      margin: -20px -20px 30px -20px; 
    }
    .brand-icon { font-size: 50px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .brand-name { font-size: 32px; font-weight: 800; color: var(--primary); text-transform: uppercase; }
    
    .cat-title { font-size: 18px; font-weight: 700; margin: 30px 0 15px; padding-left: 10px; border-left: 5px solid var(--primary); }
    .item-card { background: var(--white); border-radius: 18px; padding: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
    .item-info { flex: 1; padding-right: 15px; }
    .item-name { font-size: 16px; font-weight: 700; }
    .item-desc { font-size: 13px; color: #636e72; line-height: 1.4; }
    .item-price { font-size: 16px; font-weight: 800; color: var(--primary); background: #fff5f2; padding: 6px 12px; border-radius: 10px; white-space: nowrap; }

    /* PANEL ADMINISTRADOR (OCULTO) */
    #admin-panel { 
      display: none; 
      background: #1e272e; 
      color: white; 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      z-index: 1000; 
      padding: 20px; 
      overflow-y: scroll; 
    }
    .admin-card { background: white; color: #333; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
    .ed-item-block { background: #f1f2f6; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #dfe4ea; }
    
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-family: inherit; font-size: 14px; }
    .btn { cursor: pointer; border: none; font-weight: 600; border-radius: 12px; padding: 12px; width: 100%; margin-top: 10px; }
    .btn-save { background: #05c46b; color: white; font-size: 18px; margin: 20px 0 40px 0; }
    .btn-add { background: #ffa801; color: white; }
    .btn-cat { background: #3c40c6; color: white; margin-top: 20px; }
    .btn-del { background: #ff5e57; color: white; font-size: 12px; width: auto; padding: 5px 15px; }
    .btn-close { background: #808e9b; color: white; margin-bottom: 20px; }
  </style>
</head>
<body>

  <div class="container" id="client-view">
    <div id="menu-content">Cargando menú delicioso...</div>
  </div>

  <div id="admin-panel">
    <button class="btn btn-close" onclick="closeAdmin()">← CERRAR PANEL</button>
    <h2 style="margin-bottom:20px; text-align:center;">ADMINISTRACIÓN</h2>
    <div id="editor-content"></div>
    <button class="btn btn-cat" onclick="addCat()">+ NUEVA CATEGORÍA</button>
    <button class="btn btn-save" onclick="applyChanges()">💾 GUARDAR CAMBIOS AHORA</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // TUS CREDENCIALES EXACTAS
    const firebaseConfig = {
      apiKey: "AIzaSyByKcM9Z2_PwW0Y9xdbFIfBI6AMviiI4uQ",
      authDomain: "mi-menu-2f5bd.firebaseapp.com",
      databaseURL: "https://mi-menu-2f5bd-default-rtdb.firebaseio.com",
      projectId: "mi-menu-2f5bd",
      appId: "1:524735114538:web:f7095bb24eedcfe2ff4253"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Objeto de datos inicial
    let data = { brand: "Comida Express", cats: [] };

    // FUNCIÓN 1: Escuchar cambios en la nube (Ruta 'menuData' como en tu foto)
    db.ref('menuData').on('value', (snap) => {
      const cloud = snap.val();
      if(cloud) {
        data = cloud;
        if(!data.cats) data.cats = [];
        // Aseguramos que cada categoría tenga su lista de items
        data.cats.forEach(c => { if(!c.items) c.items = []; });
      }
      renderClientMenu();
    });

    // FUNCIÓN 2: Lógica Secreta (5 clics en 🍔)
    let clicks = 0;
    function handleLogoClick() {
      clicks++;
      if(clicks === 5) {
        if(prompt("Introduce tu clave:") === "1234") {
          openAdmin();
        }
        clicks = 0;
      }
      setTimeout(() => { clicks = 0; }, 3000);
    }

    // FUNCIÓN 3: Dibujar Menú para Clientes
    function renderClientMenu() {
      const el = document.getElementById('menu-content');
      let h = `
        <div class="brand">
          <div class="brand-icon" onclick="handleLogoClick()">🍔</div>
          <div class="brand-name">${data.brand}</div>
        </div>`;
      
      if(data.cats.length === 0) {
        h += `<p style="text-align:center; padding:40px; color:#999;">Cargando productos...</p>`;
      }

      data.cats.forEach(cat => {
        h += `<div class="cat-title">${cat.name}</div>`;
        if(cat.items) {
          cat.items.forEach(item => {
            h += `
              <div class="item-card">
                <div class="item-info">
                  <div class="item-name">${item.name || 'Producto'}</div>
                  <div class="item-desc">${item.desc || ''}</div>
                </div>
                <div class="item-price">${item.price || '$0'}</div>
              </div>`;
          });
        }
      });
      el.innerHTML = h;
    }

    // FUNCIÓN 4: Dibujar Editor para Ti
    function renderAdminEditor() {
      const el = document.getElementById('editor-content');
      let h = `<div class="admin-card"><b>Nombre del Negocio:</b><input id="brandInput" value="${data.brand}"></div>`;
      
      data.cats.forEach((cat, ci) => {
        h += `
          <div class="admin-card">
            <div style="display:flex; gap:10px; align-items:center;">
              <input style="font-weight:bold; color:var(--primary)" value="${cat.name}" onchange="data.cats[${ci}].name=this.value">
              <button class="btn btn-del" onclick="deleteCat(${ci})">Borrar Categoría</button>
            </div>`;
        
        if(cat.items) {
          cat.items.forEach((item, ii) => {
            h += `
              <div class="ed-item-block">
                <input placeholder="Nombre Plato" value="${item.name}" onchange="updateItem(${ci},${ii},'name',this.value)">
                <input placeholder="Precio" value="${item.price}" onchange="updateItem(${ci},${ii},'price',this.value)">
                <input placeholder="Descripción/Ingredientes" value="${item.desc}" onchange="updateItem(${ci},${ii},'desc',this.value)">
                <button class="btn btn-del" style="width:100%; margin-top:5px;" onclick="deleteItem(${ci},${ii})">Quitar este Plato</button>
              </div>`;
          });
        }
        h += `<button class="btn btn-add" onclick="addItem(${ci})">+ Añadir Plato a ${cat.name}</button></div>`;
      });
      el.innerHTML = h;
    }

    // FUNCIONES DE EDICIÓN
    function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; renderAdminEditor(); }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function updateItem(ci, ii, f, v) { data.cats[ci].items[ii][f] = v; }
    function deleteItem(ci, ii) { data.cats[ci].items.splice(ii, 1); renderAdminEditor(); }
    function deleteCat(ci) { data.cats.splice(ci, 1); renderAdminEditor(); }
    function addItem(ci) { if(!data.cats[ci].items) data.cats[ci].items = []; data.cats[ci].items.push({name:"", desc:"", price:""}); renderAdminEditor(); }
    function addCat() { data.cats.push({name:"Nueva Categoría", items:[]}); renderAdminEditor(); }

    // FUNCIÓN FINAL: Mandar todo a Firebase
    function applyChanges() {
      data.brand = document.getElementById('brandInput').value;
      db.ref('menuData').set(data)
        .then(() => {
          alert("✅ ¡MENÚ ACTUALIZADO! Ya todos los clientes pueden verlo.");
          closeAdmin();
        })
        .catch(err => alert("❌ Error al guardar: " + err.message));
    }
  </script>
</body>
</html>
